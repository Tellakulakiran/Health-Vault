    // ═══════════════════════════════════════════
    //  EC SMS ALERT MODAL
    // ═══════════════════════════════════════════
    function EcSmsAlert({ reminder, ec, user, type, onClose }) {
      const isTaken = type === 'taken';
      const msgBody = isTaken
        ? 'Hi ' + ec.name + ', HealthVault update: ' + (user.name || 'Patient') + ' has TAKEN their medicine ✅ ' + reminder.medicine + ' (' + reminder.dosage + ') at ' + reminder.time + '. All good! - HealthVault'
        : 'Hi ' + ec.name + ', HealthVault ALERT: ' + (user.name || 'Patient') + ' MISSED their medicine ⚠️ ' + reminder.medicine + ' (' + reminder.dosage + ') scheduled at ' + reminder.time + '. Please follow up urgently. - HealthVault';
      const smsHref = 'sms:' + (ec.phone || '') + (navigator.userAgent.includes('iPhone') ? '&' : '?') + 'body=' + encodeURIComponent(msgBody);

      React.useEffect(() => {
        const fn = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', fn);
        return () => window.removeEventListener('keydown', fn);
      }, []);

      const accentColor = isTaken ? 'var(--success)' : 'var(--danger)';
      const borderCol = isTaken ? 'rgba(42,232,143,.3)' : 'rgba(255,77,109,.3)';
      const bgCol = isTaken ? 'linear-gradient(145deg,rgba(5,40,20,.98),rgba(2,20,10,.99))' : 'linear-gradient(145deg,rgba(46,10,20,.98),rgba(22,5,10,.99))';
      const glowCol = isTaken ? 'rgba(42,232,143,.15)' : 'rgba(255,77,109,.15)';

      return (
        <div className="ec-alert-overlay" onClick={(e) => e.target === e.currentTarget && onClose()}>
          <div className="ec-alert-modal" style={{ background: bgCol, borderColor: borderCol, boxShadow: '0 0 80px ' + glowCol + ', 0 30px 60px rgba(0,0,0,.7)' }}>
            <span className="ec-alert-icon">{isTaken ? '✅' : '⚠️'}</span>
            <div className="ec-alert-title" style={{ color: accentColor }}>{isTaken ? 'Medicine Taken — Notify EC?' : 'Medicine Missed!'}</div>
            <div className="ec-alert-sub">
              <strong style={{ color: 'var(--text)' }}>{reminder.medicine} ({reminder.dosage})</strong><br />
              {isTaken ? 'Great! Inform your emergency contact this was taken.' : 'Scheduled at ' + reminder.time + ' — Notify your emergency contact?'}
            </div>
            <div className="ec-alert-contact" style={{ borderColor: isTaken ? 'rgba(42,232,143,.15)' : 'rgba(255,77,109,.15)', background: isTaken ? 'rgba(42,232,143,.04)' : 'rgba(255,77,109,.06)' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                <div>
                  <div className="ec-alert-contact-name">{ec.name}</div>
                  <div className="ec-alert-contact-detail">Emergency contact · {ec.relation}</div>
                  <div className="ec-alert-phone" style={{ color: accentColor }}>{ec.phone}</div>
                </div>
                <div style={{ textAlign: 'right', fontSize: 12, color: 'var(--muted)', lineHeight: 1.6 }}>
                  <div><strong style={{ color: 'var(--text)' }}>Patient</strong></div>
                  <div>{user.name}</div>
                  <div>🩸 {user.blood_group} · Age {user.age}</div>
                </div>
              </div>
            </div>
            <div className="ec-alert-actions">
              <button className="btn-ghost" style={{ flex: 1 }} onClick={onClose}>Skip</button>
              <a href={smsHref} className="btn-sms" onClick={onClose}
                style={{ flex: 2, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, textDecoration: 'none', background: isTaken ? 'linear-gradient(135deg,var(--success),#16a874)' : undefined }}>
                📲 Send SMS to {ec.name}
              </a>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════
    //  REMINDERS
    // ═══════════════════════════════════════════
    function RemindersPage({ user, store, onSave, toast, t }) {
      const [notifStatus, setNotifStatus] = React.useState(() =>
        'Notification' in window ? Notification.permission : 'unsupported'
      );
      const [ecAlert, setEcAlert] = React.useState(null); // { reminder, type }
      const firedRef = React.useRef(new Set());

      const ec = store.medInfo?.emergencyContact;
      const hasEc = ec && ec.name && ec.phone;

      // ⏰ Auto-scheduler: check every 30 seconds if a pending reminder’s time matches now
      React.useEffect(() => {
        const check = () => {
          const now = new Date();
          const hhmm = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
          store.reminders.forEach(r => {
            if (r.status === 'pending' && r.time === hhmm && !firedRef.current.has(r.id)) {
              firedRef.current.add(r.id);
              Notify.send(
                '💊 Time to take ' + r.medicine,
                r.dosage + ' — ' + (user.name || 'Patient') + ' — Open HealthVault to confirm.'
              );
              toast('🔔 Reminder: ' + r.medicine + ' ' + r.dosage + ' is due now!', 'info');
            }
          });
        };
        check();
        const id = setInterval(check, 30000);
        return () => clearInterval(id);
      }, [store.reminders]);

      const requestNotif = async () => {
        const perm = await Notify.request();
        setNotifStatus(perm);
        if (perm === 'granted') toast('🔔 Push notifications enabled!', 'ok');
      };

      const openSmsDirect = (reminder, type) => {
        if (!hasEc) { toast('⚠️ Add an emergency contact in Profile > Medical Info.', 'err'); return; }
        const isTaken = type === 'taken';
        const body = isTaken
          ? 'Hi ' + ec.name + ', HealthVault: ' + (user.name || 'Patient') + ' took ' + reminder.medicine + ' (' + reminder.dosage + ') at ' + reminder.time + '. ✅ - HealthVault'
          : 'Hi ' + ec.name + ', HealthVault ALERT: ' + (user.name || 'Patient') + ' missed ' + reminder.medicine + ' (' + reminder.dosage + ') at ' + reminder.time + '. ⚠️ Please follow up - HealthVault';
        const href = 'sms:' + ec.phone + (navigator.userAgent.includes('iPhone') ? '&' : '?') + 'body=' + encodeURIComponent(body);
        window.open(href, '_blank');
      };

      const update = (id, status) => {
        const rem = store.reminders.find(r => r.id === id);
        onSave({ ...store, reminders: store.reminders.map(r => r.id === id ? { ...r, status } : r) });

        if (status === 'taken') {
          // Push notification to user with full details
          Notify.send(
            '✅ Medicine Taken — ' + (rem?.medicine || ''),
            'Patient: ' + (user.name || '') + ' | Blood: ' + (user.blood_group || '') + ' | Dose: ' + (rem?.dosage || '') + ' at ' + (rem?.time || '') + (hasEc ? ' | EC: ' + ec.name + ' ✔' : '')
          );
          toast('✅ ' + (rem?.medicine || 'Medicine') + ' marked as taken!', 'ok');
          // Offer to notify EC that patient took meds
          if (hasEc && rem) setEcAlert({ reminder: rem, type: 'taken' });
        } else {
          // Push notification to user
          Notify.send(
            '⚠️ Medicine Missed — ' + (rem?.medicine || ''),
            'Patient: ' + (user.name || '') + ' | Dose: ' + (rem?.dosage || '') + ' at ' + (rem?.time || '') + (hasEc ? ' | Notifying EC: ' + ec.name : '')
          );
          toast('❌ ' + (rem?.medicine || 'Medicine') + ' missed. Notifying emergency contact…', 'err');
          // Immediately show EC alert for missed
          if (hasEc && rem) setEcAlert({ reminder: rem, type: 'missed' });
        }
      };

      const pending = store.reminders.filter(r => r.status === 'pending');
      const done = store.reminders.filter(r => r.status !== 'pending');

      return <>
        {ecAlert && <EcSmsAlert reminder={ecAlert.reminder} ec={ec} user={user} type={ecAlert.type} onClose={() => setEcAlert(null)} />}

        <div className="page-title">{t('reminders')}</div>
        <div className="page-sub">{new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>

        {/* Notification permission banner */}
        {notifStatus !== 'granted' && notifStatus !== 'unsupported' && notifStatus !== 'denied' && (
          <div className="notif-banner">
            <div className="notif-banner-icon">🔔</div>
            <div className="notif-banner-text">
              <strong style={{ color: 'var(--text)' }}>Enable push notifications</strong><br />
              Get phone alerts exactly when it's time to take medicine.
            </div>
            <button className="notif-banner-btn" onClick={requestNotif}>Enable</button>
          </div>
        )}
        {notifStatus === 'denied' && (
          <div className="notif-banner" style={{ borderColor: 'rgba(255,77,109,.2)' }}>
            <div className="notif-banner-icon">❌</div>
            <div className="notif-banner-text" style={{ color: 'var(--danger)' }}>Notifications blocked by browser. Enable in Settings → Notifications.</div>
          </div>
        )}
        {!hasEc && (
          <div className="notif-banner" style={{ borderColor: 'rgba(255,203,71,.25)', background: 'rgba(255,203,71,.04)' }}>
            <div className="notif-banner-icon">📱</div>
            <div className="notif-banner-text">
              <strong style={{ color: 'var(--text)' }}>Set up emergency contact for SMS alerts</strong><br />
              Go to Profile → Medical Info → Emergency Contact.
            </div>
          </div>
        )}

        {/* Summary row */}
        {store.reminders.length > 0 && (
          <div style={{ display: 'flex', gap: 10, marginBottom: 14 }}>
            {[
              { label: 'Pending', val: pending.length, color: 'var(--warn)' },
              { label: 'Taken', val: done.filter(r => r.status === 'taken').length, color: 'var(--success)' },
              { label: 'Missed', val: done.filter(r => r.status === 'missed').length, color: 'var(--danger)' },
            ].map(s => (
              <div key={s.label} style={{ flex: 1, background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 12, padding: '12px 16px', textAlign: 'center' }}>
                <div style={{ fontSize: 22, fontWeight: 800, fontFamily: 'var(--font-head)', color: s.color }}>{s.val}</div>
                <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 2 }}>{s.label}</div>
              </div>
            ))}
          </div>
        )}

        {store.reminders.length === 0 && <div className="card"><div className="empty-state"><div className="empty-icon">🔔</div><div className="empty-text">Add medicines to generate reminders.</div></div></div>}

        {pending.length > 0 && <div className="card" style={{ marginBottom: 14 }}>
          <div className="card-title">⏰ Pending — {pending.length}</div>
          <div className="reminder-grid">{pending.map(r => (
            <div key={r.id} className="reminder-item">
              <div className="rem-time">{r.time}</div>
              <div className="rem-info"><div className="rem-name">{r.medicine}</div><div className="rem-dose">{r.dosage}</div></div>
              <button className="rem-btn rem-taken" onClick={() => update(r.id, 'taken')}>✓ Taken</button>
              <button className="rem-btn rem-miss" onClick={() => update(r.id, 'missed')}>✗ Miss</button>
            </div>))}</div>
        </div>}

        {done.length > 0 && <div className="card">
          <div className="card-title">📊 History — {done.length}</div>
          <div className="reminder-grid">{done.map(r => (
            <div key={r.id} className="reminder-item" style={{ opacity: r.status === 'missed' ? 1 : .65 }}>
              <div className="rem-time" style={{ color: r.status === 'missed' ? 'var(--danger)' : r.status === 'taken' ? 'var(--success)' : 'var(--muted)' }}>{r.time}</div>
              <div className="rem-info"><div className="rem-name">{r.medicine}</div><div className="rem-dose">{r.dosage}</div></div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
                <div style={{ color: r.status === 'taken' ? 'var(--success)' : 'var(--danger)', fontSize: 12, fontWeight: 700 }}>
                  {r.status === 'taken' ? '✓ Taken' : '✗ Missed'}
                </div>
                {hasEc && (
                  <button className="rem-btn-notify" onClick={() => openSmsDirect(r, r.status)}
                    style={{
                      background: r.status === 'taken' ? 'rgba(42,232,143,.08)' : undefined,
                      color: r.status === 'taken' ? 'var(--success)' : undefined,
                      borderColor: r.status === 'taken' ? 'rgba(42,232,143,.25)' : undefined
                    }}>
                    📲 SMS EC
                  </button>
                )}
              </div>
            </div>))}
          </div>
        </div>}
      </>;
    }

    // ═══════════════════════════════════════════
    //  REPORTS  (multi-file: image, pdf, txt, doc)
    // ═══════════════════════════════════════════
    function ReportsPage({ store, onSave, toast, t }) {
      const [analyzing, setAnalyzing] = React.useState(false);
      const [dragOver, setDragOver] = React.useState(false);
      const fileRef = React.useRef(null);

      const processFile = (file) => {
        return new Promise((resolve) => {
          const fi = getFileIcon(file.name);
          const base = { id: store.nextId + Math.floor(Math.random() * 1000), filename: file.name, date: new Date().toISOString().slice(0, 10), fileType: fi.label, fileColor: fi.color };
          if (isImage(file.name)) {
            const reader = new FileReader();
            reader.onload = (ev) => resolve({ ...base, imageData: ev.target.result, extracted: { diseases_detected: [], medicines_detected: [], test_results: {} } });
            reader.readAsDataURL(file);
          } else {
            const reader = new FileReader();
            reader.onload = (ev) => {
              const text = ev.target.result || '';
              resolve({ ...base, extracted: extractFromText(text) });
            };
            reader.readAsText(file);
          }
        });
      };

      const handleFiles = async (files) => {
        if (!files || files.length === 0) return;
        setAnalyzing(true);
        try {
          await new Promise(r => setTimeout(r, 1200));
          const results = await Promise.all(Array.from(files).map(processFile));
          const updated = { ...store, nextId: store.nextId + results.length * 2, reports: [...results, ...store.reports] };
          onSave(updated);
          const imgCount = results.filter(r => r.imageData).length;
          const docCount = results.length - imgCount;
          const parts = [];
          if (imgCount) parts.push(`${imgCount} image(s)`);
          if (docCount) parts.push(`${docCount} document(s)`);
          toast(`✓ Uploaded ${parts.join(' + ')} successfully`);
        } catch (e) { toast('Upload failed', 'err'); }
        setAnalyzing(false);
        if (fileRef.current) fileRef.current.value = '';
      };

      const handleInput = (e) => handleFiles(e.target.files);
      const handleDrop = (e) => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); };
      const removeReport = (id) => { onSave({ ...store, reports: store.reports.filter(r => r.id !== id) }); toast('Report removed.'); };

      return <>
        <div className="page-title">{t('reports')}</div>
        <div className="page-sub">Upload and AI-analyze health documents, scans & images</div>
        <div className="card" style={{ marginBottom: 20 }}>
          <div className={`upload-zone ${dragOver ? 'drag-over' : ''}`}
            onClick={() => !analyzing && fileRef.current.click()}
            onDragOver={e => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onDrop={handleDrop}>
            <input ref={fileRef} type="file" accept="image/*,.pdf,.txt,.doc,.docx,.xls,.xlsx" multiple style={{ display: 'none' }} onChange={handleInput} />
            <div className="upload-icon">{analyzing ? '⏳' : '📂'}</div>
            <div className="upload-text">{analyzing ? 'Analyzing uploaded files…' : 'Upload Medical Files'}</div>
            <div className="upload-sub">{analyzing ? 'AI is extracting health data from your documents…' : 'Click to browse or drag & drop multiple files at once'}</div>
            <div className="file-types">
              {['🖼️ Images', '📄 PDF', '📝 Word', '📊 Excel', '📃 Text'].map(t_chip => (
                <span key={t_chip} className="file-type-chip">{t_chip}</span>))}
            </div>
          </div>
        </div>

        {store.reports.length === 0 && <div className="card"><div className="empty-state"><div className="empty-icon">📋</div><div className="empty-text">No reports yet. Upload your first document above.</div></div></div>}

        {store.reports.map(r => {
          const fi = getFileIcon(r.filename);
          return (
            <div key={r.id} className="report-card">
              <div className="report-hdr">
                <div className="report-left">
                  <div className="report-file-icon" style={{ background: `${fi.color}18` }}>{fi.icon}</div>
                  <div>
                    <div className="report-name">{r.filename}</div>
                    <div className="report-date">{r.date} &nbsp;·&nbsp; <span style={{ color: fi.color, fontWeight: 600 }}>{r.fileType || fi.label}</span></div>
                  </div>
                </div>
                <button className="btn-danger" onClick={() => removeReport(r.id)}>Remove</button>
              </div>
              {r.imageData && <img src={r.imageData} alt={r.filename} className="img-preview" />}
              {r.extracted && !r.imageData && <div className="extracted-grid">
                <div className="extracted-item"><div className="ext-label">Diseases Detected</div>
                  <div className="ext-value" style={{ color: 'var(--accent)' }}>{r.extracted.diseases_detected?.join(', ') || 'None detected'}</div></div>
                <div className="extracted-item"><div className="ext-label">Medicines Detected</div>
                  <div className="ext-value" style={{ color: 'var(--accent2)' }}>{r.extracted.medicines_detected?.join(', ') || 'None detected'}</div></div>
                <div className="extracted-item"><div className="ext-label">Lab Results</div>
                  <div className="ext-value" style={{ color: 'var(--warn)', fontSize: 11 }}>{Object.entries(r.extracted.test_results || {}).map(([k, v]) => `${k}: ${v}`).join(' · ') || 'None detected'}</div></div>
              </div>}
              {r.imageData && <div style={{ fontSize: 12, color: 'var(--muted)', background: 'var(--surface)', borderRadius: 8, padding: '8px 12px' }}>
                🖼️ Image uploaded and stored. In production, OCR would extract text data from this scan.
              </div>}
            </div>);
        })}
      </>;
    }

    // ═══════════════════════════════════════════
    //  CONDITIONS
    // ═══════════════════════════════════════════

      const [showAdd, setShowAdd] = React.useState(false);

        if (!form.name || !form.date) { toast('Name and date required', 'err'); return; }

        toast('✓ Condition saved.'); setShowAdd(false); setForm({ name: '', date: '', severity: 'moderate' });
      };
      const remove = (id) => { onSave({ ...store, diseases: store.diseases.filter(d => d.id !== id) }); toast('Condition removed.'); };

        <div className="page-hdr">
          <div><div className="page-title">{t('conditions')}</div><div className="page-sub">Track diagnosed medical conditions</div></div>

        </div>

          <div className="add-title">{t('addCondition')}</div>

              <input className="form-input" placeholder="e.g. Type 2 Diabetes" value={form.name} onChange={e => set('name', e.target.value)} /></div>
            <div className="form-group"><label className="form-label">{t('diagnosisDate')}</label>
              <input className="form-input" type="date" value={form.date} onChange={e => set('date', e.target.value)} /></div>
          </div>
          <div className="form-group"><label className="form-label">{t('severity')}</label>
            <select className="form-input form-select" value={form.severity} onChange={e => set('severity', e.target.value)}>
              <option value="mild">{t('mild')}</option><option value="moderate">{t('moderate')}</option><option value="severe">{t('severe')}</option>
            </select></div>
          <div className="btn-row"><button className="btn-accent" onClick={save}>{t('addCondition')}</button></div>
        </div>}
        <div className="card">
          {store.diseases.length === 0 ? <div className="empty-state"><div className="empty-icon">🩺</div><div className="empty-text">No conditions recorded.</div></div>
            : <table className="data-table"><thead><tr><th>{t('conditions')}</th><th>{t('diagnosedAt')}</th><th>{t('severity')}</th><th></th></tr></thead>
              <tbody>{store.diseases.map(d => (
                <tr key={d.id}><td style={{ fontWeight: 500 }}>{d.disease_name}</td>
                  <td style={{ color: 'var(--muted)' }}>{d.diagnosed_date}</td>
                  <td><span className={`badge ${d.severity === 'mild' ? 'badge-green' : d.severity === 'severe' ? 'badge-red' : 'badge-amber'}`}>{t(d.severity)}</span></td>
                  <td><button className="btn-danger" onClick={() => remove(d.id)}>{t('remove')}</button></td>
                </tr>))}</tbody></table>}
        </div>
      </>;
    }

      const [newFH, setNewFH] = React.useState('');
      const [newVacc, setNewVacc] = React.useState('');
      const [ecForm, setEcForm] = React.useState({ ...medInfo.emergencyContact });

      const saveProfile = () => {
        const accounts = LS.get('accounts', {});
        accounts[user.email] = { ...accounts[user.email], ...profileForm };
        LS.set('accounts', accounts);
        LS.set('session', { ...user, ...profileForm });
        setUser({ ...user, ...profileForm });
        setEditing(false);
        toast('✓ Profile updated!');
      };

      const savePhoto = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const photo = ev.target.result;
          const accounts = LS.get('accounts', {});
          accounts[user.email] = { ...accounts[user.email], photo };
          LS.set('accounts', accounts); LS.set('session', { ...user, photo });
          setUser(p => ({ ...p, photo })); setProfileForm(p => ({ ...p, photo }));
          toast('✓ Profile photo updated!');
        };
        reader.readAsDataURL(file);
      };

      const addAllergy = () => {
        if (!newAllergy.trim()) return;
        const updated = { ...store, medInfo: { ...medInfo, allergies: [...medInfo.allergies, newAllergy.trim()] } };
        onSave(updated); setNewAllergy(''); toast('Allergy added.');
      };
      const removeAllergy = (i) => {
        const arr = [...medInfo.allergies]; arr.splice(i, 1);
        onSave({ ...store, medInfo: { ...medInfo, allergies: arr } });
      };
      const addSurgery = () => {
        if (!newSurgery.trim()) return;
        onSave({ ...store, medInfo: { ...medInfo, surgeries: [...medInfo.surgeries, newSurgery.trim()] } }); setNewSurgery(''); toast('Surgery record added.');
      };
      const removeSurgery = (i) => {
        const arr = [...medInfo.surgeries]; arr.splice(i, 1); onSave({ ...store, medInfo: { ...medInfo, surgeries: arr } });
      };
      const addFH = () => {
        if (!newFH.trim()) return;
        onSave({ ...store, medInfo: { ...medInfo, familyHistory: [...medInfo.familyHistory, newFH.trim()] } }); setNewFH(''); toast('Family history added.');
      };
      const removeFH = (i) => {
        const arr = [...medInfo.familyHistory]; arr.splice(i, 1); onSave({ ...store, medInfo: { ...medInfo, familyHistory: arr } });
      };
      const addVacc = () => {
        if (!newVacc.trim()) return;
        onSave({ ...store, medInfo: { ...medInfo, vaccinations: [...medInfo.vaccinations, newVacc.trim()] } }); setNewVacc(''); toast('Vaccination added.');
      };
      const removeVacc = (i) => {
        const arr = [...medInfo.vaccinations]; arr.splice(i, 1); onSave({ ...store, medInfo: { ...medInfo, vaccinations: arr } });
      };
      const saveEC = () => {
        onSave({ ...store, medInfo: { ...medInfo, emergencyContact: { ...ecForm } } });
        setShowQR(true);
        toast('✓ Emergency contact saved & QR generated.', 'info');
      };
      const saveSettings = () => {
        onSave({ ...store, settings: { ...sett } }); toast('✓ ' + t('settingsSaved'));
      };

      const photoRef = React.useRef(null);

      const TABS = [
        { id: 'personal', label: '👤 ' + t('personal') },
        { id: 'medical', label: '🏥 ' + t('medical') },
        { id: 'settings', label: '⚙️ ' + t('settings') },
      ];

      return <>
        {/* Hero */}
        <div className="profile-hero">
          <div className="profile-hero-row">
            <div className="profile-avatar-wrap" onClick={() => photoRef.current.click()} title="Change photo">
              <div className="profile-avatar">
                {user.photo ? <img src={user.photo} alt="avatar" /> : user.name?.[0]?.toUpperCase()}
              </div>
              <div className="avatar-edit">✏️</div>
              <input ref={photoRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={savePhoto} />
            </div>
            <div className="profile-headline">
              <div className="profile-display-name">{user.name}</div>
              <div style={{ color: 'var(--muted)', fontSize: 13 }}>{user.email}</div>
              <div className="profile-tags">
                <span className="badge badge-teal">🩸 {user.blood_group}</span>
                <span className="badge badge-blue">{t('age')} {user.age}</span>
                <span className="badge badge-purple">{user.gender}</span>
                {user.occupation && <span className="badge" style={{ background: 'rgba(255,184,48,.1)', color: 'var(--warn)' }}>💼 {user.occupation}</span>}
              </div>
            </div>
            {!editing && <button className="profile-edit-btn" onClick={() => setEditing(true)}>✏️ {t('editProfile') || 'Edit Profile'}</button>}
            {editing && <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn-accent" onClick={saveProfile}>{t('save') || 'Save'}</button>
              <button className="btn-ghost" onClick={() => { setEditing(false); setProfileForm({ ...user }); }}>{t('cancel') || 'Cancel'}</button>
            </div>}
          </div>
        </div>

        {/* Tabs */}
        <div className="profile-tabs">
          {TABS.map(t => <button key={t.id} className={`profile-tab ${activeTab === t.id ? 'active' : ''}`} onClick={() => setActiveTab(t.id)}>{t.label}</button>)}
        </div>

        {/* ── PERSONAL TAB ── */}
        {activeTab === 'personal' && <>
          <div className="card" style={{ marginBottom: 14 }}>
            <div className="card-title">👤 {t('personalInfo')}</div>
            <div className="info-grid">
              {[
                { label: t('fullName'), key: 'name', placeholder: 'Your full name' },
                { label: 'Email', key: 'email', placeholder: 'Email address', disabled: true },
                { label: t('age'), key: 'age', placeholder: 'Age', type: 'number' },
                { label: t('gender'), key: 'gender', type: 'select', opts: ['male', 'female', 'other'] },
                { label: t('bloodGroup'), key: 'blood_group', type: 'select', opts: BLOOD_GROUPS },
                { label: t('phone'), key: 'phone', placeholder: '+91 98765 43210' },
                { label: t('occupation'), key: 'occupation', placeholder: 'e.g. Software Engineer' },
                { label: t('address'), key: 'address', placeholder: 'City, State' },
              ].map(f => (
                <div key={f.key} className="info-field">
                  <div className="info-field-label">{f.label}</div>
                  {!editing
                    ? <div className="info-field-val">{profileForm[f.key] || <span style={{ color: 'var(--muted)' }}>{t('notSet')}</span>}</div>
                    : f.type === 'select'
                      ? <select className="info-field-val editing form-select" style={{ width: '100%', background: 'transparent' }}
                        value={profileForm[f.key] || ''} onChange={e => pset(f.key, e.target.value)}>
                        {f.opts.map(o => <option key={o}>{t(o)}</option>)}</select>
                      : <input className="info-field-val editing" type={f.type || 'text'} placeholder={f.placeholder}
                        disabled={f.disabled} value={profileForm[f.key] || ''} onChange={e => pset(f.key, e.target.value)} />}
                </div>))}
            </div>
            {editing && <div style={{ color: 'var(--muted)', fontSize: 12, marginTop: 4 }}>Click "Save" in the header to apply changes</div>}
          </div>

          {/* Account summary */}
          <div className="card">
            <div className="card-title">📊 {t('accountSummary')}</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12 }}>
              {[
                { label: 'Medicines', value: store.medicines.filter(m => m.active).length, icon: '💊' },
                { label: 'Conditions', value: store.diseases.length, icon: '🩺' },
                { label: 'Reports', value: store.reports.length, icon: '📋' },
              ].map(s => (
                <div key={s.label} style={{ background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 10, padding: '14px 16px', textAlign: 'center' }}>
                  <div style={{ fontSize: 24, marginBottom: 6 }}>{s.icon}</div>
                  <div style={{ fontFamily: 'var(--font-head)', fontSize: 22, fontWeight: 800 }}>{s.value}</div>
                  <div style={{ color: 'var(--muted)', fontSize: 12, marginTop: 3 }}>{s.label}</div>
                </div>))}
            </div>
          </div>
        </>}

        {/* ── MEDICAL INFO TAB ── */}
        {activeTab === 'medical' && <>
          {/* Allergies */}
          <div className="med-info-card">
            <div className="med-info-title">⚠️ {t('allergies')}</div>
            <div>{medInfo.allergies.map((a, i) => (
              <span key={i} className="allergy-tag">{a}<button onClick={() => removeAllergy(i)}>×</button></span>))}
              {medInfo.allergies.length === 0 && <div style={{ color: 'var(--muted)', fontSize: 13 }}>No allergies recorded</div>}
            </div>
            <div className="tag-input-row">
              <input className="form-input" placeholder="e.g. Penicillin, Peanuts…" value={newAllergy} onChange={e => setNewAllergy(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addAllergy()} style={{ flex: 1 }} />
              <button className="btn-accent" onClick={addAllergy}>{t('add')}</button>
            </div>
          </div>

          {/* Surgeries */}
          <div className="med-info-card">
            <div className="med-info-title">🏥 {t('surgeries')}</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {medInfo.surgeries.map((s, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: 'var(--surface)', borderRadius: 8, padding: '8px 12px', fontSize: 13 }}>
                  <span>{s}</span><button className="btn-danger" onClick={() => removeSurgery(i)}>Remove</button>
                </div>))}
              {medInfo.surgeries.length === 0 && <div style={{ color: 'var(--muted)', fontSize: 13 }}>No surgeries recorded</div>}
            </div>
            <div className="tag-input-row">
              <input className="form-input" placeholder="e.g. Appendectomy 2019…" value={newSurgery} onChange={e => setNewSurgery(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addSurgery()} style={{ flex: 1 }} />
              <button className="btn-accent" onClick={addSurgery}>{t('add')}</button>
            </div>
          </div>

          {/* Family History */}
          <div className="med-info-card">
            <div className="med-info-title">🧬 {t('familyHistory')}</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {medInfo.familyHistory.map((f, i) => (
                <span key={i} style={{ display: 'inline-flex', alignItems: 'center', gap: 5, background: 'rgba(77,142,255,.08)', border: '1px solid rgba(77,142,255,.2)', color: 'var(--accent2)', borderRadius: 7, padding: '4px 10px', fontSize: 12 }}>
                  {f}<button style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--muted)', fontSize: 13, padding: 0, lineHeight: 1 }} onClick={() => removeFH(i)}>×</button>
                </span>))}
              {medInfo.familyHistory.length === 0 && <div style={{ color: 'var(--muted)', fontSize: 13 }}>No family history recorded</div>}
            </div>
            <div className="tag-input-row">
              <input className="form-input" placeholder="e.g. Father — Diabetes…" value={newFH} onChange={e => setNewFH(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addFH()} style={{ flex: 1 }} />
              <button className="btn-accent" onClick={addFH}>{t('add')}</button>
            </div>
          </div>

          {/* Vaccinations */}
          <div className="med-info-card">
            <div className="med-info-title">💉 {t('vaccinations')}</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {medInfo.vaccinations.map((v, i) => (
                <span key={i} style={{ display: 'inline-flex', alignItems: 'center', gap: 5, background: 'rgba(34,214,138,.08)', border: '1px solid rgba(34,214,138,.2)', color: 'var(--success)', borderRadius: 7, padding: '4px 10px', fontSize: 12 }}>
                  {v}<button style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--muted)', fontSize: 13, padding: 0, lineHeight: 1 }} onClick={() => removeVacc(i)}>×</button>
                </span>))}
              {medInfo.vaccinations.length === 0 && <div style={{ color: 'var(--muted)', fontSize: 13 }}>No vaccinations recorded</div>}
            </div>
            <div className="tag-input-row">
              <input className="form-input" placeholder="e.g. COVID-19, Flu 2024…" value={newVacc} onChange={e => setNewVacc(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addVacc()} style={{ flex: 1 }} />
              <button className="btn-accent" onClick={addVacc}>{t('add')}</button>
            </div>
          </div>

          {/* Emergency Contact */}
          <div className="emergency-card">
            <div className="emergency-card-title">🆘 {t('emergencyContact')}</div>
            <div className="form-row3" style={{ gap: 10 }}>
              {[
                { label: 'Name', key: 'name', placeholder: 'Contact name' },
                { label: 'Phone', key: 'phone', placeholder: '+91 98765 43210' },
                { label: 'Relation', key: 'relation', placeholder: 'e.g. Spouse' },
              ].map(f => (
                <div key={f.key}>
                  <label className="form-label">{f.label}</label>
                  <input className="form-input" placeholder={f.placeholder} value={ecForm[f.key] || ''} onChange={e => setEcForm(p => ({ ...p, [f.key]: e.target.value }))} />
                </div>))}
            </div>
            <div className="btn-row">
              <button className="btn-accent" onClick={saveEC}>&#x1F4BE; {t('saveGenerateQR')}</button>
              {medInfo.emergencyContact?.name && (
                <button className="btn-ghost" onClick={() => setShowQR(true)}>🔍 {t('viewQR')}</button>
              )}
            </div>
          </div>
          {showQR && <QRModal user={user} ecForm={ecForm} store={store} onClose={() => setShowQR(false)} />}
        </>}

        {/* ── SETTINGS TAB ── */}
        {activeTab === 'settings' && <>
          {/* Notifications */}
          <div className="settings-group">
            <div className="settings-group-title">🔔 {t('notifications')}</div>
            {[
              { key: 'emailReminders', label: t('emailReminders'), desc: 'Send medicine reminders to your email' },
              { key: 'smsReminders', label: t('smsReminders'), desc: 'Send reminders via SMS' },
              { key: 'pushNotifications', label: t('pushNotifications'), desc: 'Browser push notifications' },
            ].map(s => (
              <div key={s.key} className="settings-row">
                <div><div className="settings-label">{s.label}</div><div className="settings-desc">{s.desc}</div></div>
                <button className={`toggle ${sett[s.key] ? 'on' : ''}`} onClick={() => stgl(s.key)} />
              </div>))}
            <div className="settings-row">
              <div><div className="settings-label">{t('reminderAdvance')}</div><div className="settings-desc">How early to send reminders</div></div>
              <select className="settings-select" value={sett.reminderAdvance} onChange={e => sset('reminderAdvance', e.target.value)}>
                {['5min', '10min', '15min', '30min', '1hr'].map(v => <option key={v}>{v}</option>)}
              </select>
            </div>
          </div>

          {/* Preferences */}
          <div className="settings-group">
            <div className="settings-group-title">🎨 {t('preferences')}</div>
            <div className="settings-row">
              <div><div className="settings-label">{t('language')}</div><div className="settings-desc">App display language</div></div>
              <select className="settings-select" value={sett.language} onChange={e => sset('language', e.target.value)}>
                {['English', 'Hindi', 'Telugu'].sort().map(v => <option key={v}>{v}</option>)}
              </select>
            </div>

            <div className="settings-row">
              <div><div className="settings-label">{t('units')}</div><div className="settings-desc">Units for height, weight, temperature</div></div>
              <select className="settings-select" value={sett.units} onChange={e => sset('units', e.target.value)}>
                <option value="metric">{t('metric')}</option>
                <option value="imperial">{t('imperial')}</option>
              </select>
            </div>
            <div className="btn-row" style={{ marginTop: 20 }}>
              <button className="btn-accent" style={{ width: '100%', justifyContent: 'center' }} onClick={saveSettings}>
                💾 {t('save')}
              </button>
            </div>
          </div>

          {/* Privacy */}
          <div className="settings-group">
            <div className="settings-group-title">🔒 {t('privacySecurity')}</div>
            <div className="settings-row" style={{ marginTop: 10 }}>
              <button className="btn-danger action-btn" style={{ width: '100%', justifyContent: 'center' }} onClick={(e) => {
                setTimeout(() => {
                  if (confirm('Clear all local data?')) { localStorage.clear(); location.reload(); }
                }, 100);
              }}>
                🗑️ {t('clearData')}
              </button>
            </div>
            <div className="settings-row" style={{ marginTop: 0 }}>
              <button className="btn-ghost" style={{ width: '100%', justifyContent: 'center', color: 'var(--danger)' }} onClick={onLogout}>
                ⏻ {t('signOut')}
              </button>
            </div>
          </div>
        </>}
      </>;
    }

    // ═══════════════════════════════════════════
    //  APP ROOT
    // ═══════════════════════════════════════════
    const NAV = [
      { id: 'dashboard', icon: '⬡', label: 'Dashboard' },
      { id: 'medicines', icon: '💊', label: 'Medicines' },
      { id: 'reminders', icon: '🔔', label: 'Reminders' },
      { id: 'diseases', icon: '🩺', label: 'Conditions' },
      { id: 'reports', icon: '📋', label: 'Reports' },
    ];

    function App() {
      const [welcomed, setWelcomed] = React.useState(() => LS.get('welcomed', false));
      const [user, setUser] = React.useState(() => LS.get('session', null));
      const [page, setPage] = React.useState('dashboard');
      const [store, setStore] = React.useState(() => LS.get('session', null) ? loadStore(LS.get('session').email) : null);
      const { toasts, toast } = useToast();

      const t = (key) => {
        const lang = store?.settings?.language || 'English';
        return TRANSLATIONS[lang]?.[key] || TRANSLATIONS.English[key] || key;
      };

      const login = (u, profStore) => {
        setUser(u);
        if (profStore) {
          profStore.medicines = [];
          profStore.reminders = [];
          profStore.reports = [];
          profStore.nextId = 1;
          setStore(profStore);
        } else {
          setStore(loadStore(u.email));
        }
        setPage('dashboard');
      };
      const logout = () => { LS.del('session'); localStorage.removeItem('access_token'); setUser(null); setStore(null); };

      const handleSave = (updated) => { setStore(updated); persistStore(user.email, updated); };

      const handleUserUpdate = (u) => { setUser(u); };

      // Global click listener for voice feedback
      React.useEffect(() => {
        let isVoiceEnabled = store?.settings?.voiceEnabled;
        if (isVoiceEnabled === undefined) isVoiceEnabled = LS.get('voice_enabled', false);
        if (!isVoiceEnabled) return;

        const currentLang = store?.settings?.language || LS.get('temp_lang', 'English');
        const MAP = { 'English': 'en-US', 'Hindi': 'hi-IN', 'Telugu': 'te-IN', 'Spanish': 'es-ES', 'Arabic': 'ar-SA' };

        const speakText = (text) => {
          if (!text) return;
          text = text.replace(/[^\w\s\u0900-\u097F\u0C00-\u0C7F\u00C0-\u00FF]/g, '').trim();


          if (text) {
            const synth = window.speechSynthesis;
            synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            const code = MAP[currentLang] || 'en-US';
            u.lang = code;

            const voiceName = store?.settings?.voiceName || LS.get('voice_name', '');
            const voices = window.speechSynthesis.getVoices();
            let voice = voices.find(v => v.name === voiceName);
            if (!voice) voice = getBestVoice(code);
            if (voice) u.voice = voice;

            synth.speak(u);
          }
        };

        const handleClick = (e) => {
          // Find closest clickable element (button, a, nav-item, tab, etc)
          const el = e.target.closest('button, a, .nav-item, .tab-btn, .action-btn, .sb-profile, .card-btn, .logout-row, .toggle');
          if (!el) return;
          let text = el.innerText || el.textContent || el.title; // fallback to title for icon buttons
          speakText(text);
        };

        const handleFocus = (e) => {
          const el = e.target;
          if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT') {
            let text = el.placeholder || el.name;
            // Try to find the associated label or previous sibling text
            if (el.closest('div')) {
              const label = el.closest('div').querySelector('.form-label, .info-field-label');
              if (label) text = label.innerText;
              else {
                const siblingLabel = el.previousElementSibling;
                if (siblingLabel && (siblingLabel.tagName === 'LABEL' || siblingLabel.className.includes('label'))) {
                  text = siblingLabel.innerText;
                }
              }
            }
            speakText(text);
          }
        };

        document.addEventListener('click', handleClick);
        document.addEventListener('focusin', handleFocus);
        return () => {
          document.removeEventListener('click', handleClick);
          document.removeEventListener('focusin', handleFocus);
        };
      }, [welcomed, user, store?.settings?.language]);

      if (!welcomed) return <WelcomeOverlay onDone={(lang, voiceEnabled, voiceName) => {
        LS.set('welcomed', true);
        LS.set('temp_lang', lang);
        LS.set('voice_enabled', voiceEnabled);
        LS.set('voice_name', voiceName);
        setWelcomed(true);
      }} />;

      if (!user) return <><AuthPage onLogin={login} /><ToastContainer toasts={toasts} /></>;

      const pending = store.reminders.filter(r => r.status === 'pending').length;
      const props = { store, onSave: handleSave, toast, user, setUser: handleUserUpdate, onLogout: logout, t };

      const pages = {
        dashboard: <DashboardPage {...props} />,
        medicines: <MedicinesPage {...props} />,
        reminders: <RemindersPage {...props} />,
        diseases: <DiseasesPage  {...props} />,
        reports: <ReportsPage   {...props} />,
        profile: <ProfilePage   {...props} />,
      };

      return (
        <div className="app-shell">
          <aside className="sidebar">
            <div className="sidebar-top">
              <div className="sidebar-logo">✦ Health<span>Vault</span></div>
              {/* Profile card */}
              <div className="sb-profile" onClick={() => setPage('profile')}>
                <div className="sb-badge" />
                <div className="sb-profile-row">
                  <div className="sb-avatar">
                    {user.photo ? <img src={user.photo} alt="avatar" /> : user.name?.[0]?.toUpperCase()}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div className="sb-name" style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{user.name}</div>
                    <div className="sb-meta">🩸 {user.blood_group} · {user.age}{t('age')[0].toLowerCase()} · {user.gender}</div>
                  </div>
                  <span style={{ color: 'var(--muted)', fontSize: 12 }}>›</span>
                </div>
              </div>
            </div>

            <div className="nav-scroll">
              <div className="nav-label">Main Menu</div>
              {NAV.map(n => (
                <div key={n.id} className={`nav-item ${page === n.id ? 'active' : ''}`} onClick={() => setPage(n.id)}>
                  <span className="nav-icon">{n.icon}</span>
                  {t(n.id)}
                  {n.id === 'reminders' && pending > 0 && <span className="nav-badge">{pending}</span>}
                </div>))}

              <div className="nav-label">Account</div>
              <div className={`nav-item ${page === 'profile' ? 'active' : ''}`} onClick={() => setPage('profile')}>
                <span className="nav-icon">👤</span>{t('profileSettings')}
              </div>
            </div>

            <div className="sidebar-foot">
              <div className="logout-row" onClick={logout}>
                <span style={{ fontSize: 16 }}>⏻</span>{t('signOut')}
              </div>
            </div>
          </aside>

          <main className="main-content">{pages[page] || pages.dashboard}</main>
          <ToastContainer toasts={toasts} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
